<!DOCTYPE html>
<html>
<head>
    <title>Report Violation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Submit Violation Report</h2>

<form id="reportForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="location" placeholder="Location" required>
    <textarea id="description" placeholder="Describe the violation..." required></textarea>

    
    <input type="number" id="fine" placeholder="Fine Amount (₹)">

    <input type="file" id="photoUpload" accept="image/*">

    <button type="submit">Submit</button>
</form>

<br>
<button onclick="window.location.href='index.html'">Back to Home</button>

<script src="script.js"></script>


<script>
document.getElementById("reportForm").addEventListener("submit", function() {
    let fine = document.getElementById("fine");

    if (fine.value === "") {
        fine.value = 0;
    }
});
</script>

</body>
</html>
